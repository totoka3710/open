<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoun Poster Finder</title>
    <link rel="icon" href="icon.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json" />
    
    <script src="script.js"></script>
    
    <!--各回生のdata.jsへリンク-->
    <script src="PDF/15/data.js"></script>
    <script src="PDF/16/data.js"></script>
    <script src="PDF/17/data.js"></script>
    <script src="PDF/18/data.js"></script>
    <script src="PDF/19/data.js"></script>
    <script src="PDF/20/data.js"></script>
    <script src="PDF/21/data.js"></script>
    <script src="PDF/22/data.js"></script>
    
    <!--新規回生を追加する場合は↑ココ↑に追加していってください-->

    <script src="fuse.min.js"></script><!--Fuse.jsへリンク-->
    
</head>
<body>
    <div id="filter-section"><!--ヘッダー-->
        <div id="search-controls">
            <input type="text" id="search-bar" placeholder="検索 (タイトル・作者・キーワードなど)"><!--Fuse.jsで処理してるので、詳しいことは分かってない-->
            <div id="settings-container"><!--画面右上の設定ボタン-->
                <button id="settings-btn">︙</button>
                <div id="settings-panel">
                    <div class="settings-group">
                        <label for="sort-by">並び替え:</label>
                        <select id="sort-by">
                            <option value="generation-desc">新しい順</option>
                            <option value="generation-asc">古い順</option>
                            <option value="title-asc">タイトル昇順</option>
                            <option value="title-desc">タイトル降順</option>
                        </select>
                    </div>
                    <div class="settings-group">
                        <label>ダークモード</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="dark-mode-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <div id="filters">
            <div class="filter-box1"><!--回生絞込 or検索-->
                <label><input type="checkbox" class="generation-filter" value="15">15回生</label>
                <label><input type="checkbox" class="generation-filter" value="16">16回生</label>
                <label><input type="checkbox" class="generation-filter" value="17">17回生</label>
                <label><input type="checkbox" class="generation-filter" value="18">18回生</label>
                <label><input type="checkbox" class="generation-filter" value="19">19回生</label>
                <label><input type="checkbox" class="generation-filter" value="20">20回生</label>
                <label><input type="checkbox" class="generation-filter" value="21">21回生</label>
                <label><input type="checkbox" class="generation-filter" value="22">22回生</label>
                
                <!--新規回生を追加する場合は↑ココ↑に追加してください-->
            </div>
            <div class="filter-box2"><!--ジャンル絞込 and検索-->
                <label><input type="checkbox" class="genre-filter" value="化学">化学</label>
                <label><input type="checkbox" class="genre-filter" value="環境">環境</label>
                <label><input type="checkbox" class="genre-filter" value="教育">教育</label>
                <label><input type="checkbox" class="genre-filter" value="経営">経営</label>
                <label><input type="checkbox" class="genre-filter" value="経済">経済</label>
                <label><input type="checkbox" class="genre-filter" value="芸術">芸術</label>
                <label><input type="checkbox" class="genre-filter" value="言語">言語</label>
                <label><input type="checkbox" class="genre-filter" value="健康">健康</label>
                <label><input type="checkbox" class="genre-filter" value="工学">工学</label>
                <label><input type="checkbox" class="genre-filter" value="国際">国際</label>
                <label><input type="checkbox" class="genre-filter" value="情報">情報</label>
                <label><input type="checkbox" class="genre-filter" value="人権">人権</label>
                <label><input type="checkbox" class="genre-filter" value="数学">数学</label>
                <label><input type="checkbox" class="genre-filter" value="スポーツ">スポーツ</label>
                <label><input type="checkbox" class="genre-filter" value="生物">生物</label>
                <label><input type="checkbox" class="genre-filter" value="福祉">福祉</label>
                <label><input type="checkbox" class="genre-filter" value="物理">物理</label>
                <label><input type="checkbox" class="genre-filter" value="文化">文化</label>
                <label><input type="checkbox" class="genre-filter" value="歴史">歴史</label>
                <label><input type="checkbox" class="genre-filter" value="その他">その他</label>
                <label><input type="checkbox" id="favorites-only-toggle"> お気に入り</label>
            </div>
        </div>
        <div id="count-display"></div><!--何件中何件の表示-->
    </div>
    
    <div id="pdf-list"></div><!--検索結果-->

    <div id="preview-modal" class="hidden"><!--PDFプレビュー-->
        <div class="modal-content">
            <span id="close-modal">&times;</span>
            <iframe id="pdf-preview-frame" src=""></iframe>
        </div>
    </div>

    <div id="context-menu" class="hidden"><!--右クリック-->
        <ul>
            <li id="context-preview">プレビュー</li>
            <li id="context-open-tab">新しいタブで開く</li>
            <li id="context-favorite">お気に入りに追加/解除</li>
        </ul>
    </div>

    <button id="back-to-top" class="hidden">↑</button><!--トップへ戻るボタン-->
</body>
</html>
