<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>秘書検定クイズ大会 得点板</title>
    <style>
        /* 全体のベースデザイン（クイズ番組風のダークテーマ） */
        body {
            margin: 0;
            padding: 0;
            background: #111; /* 黒背景 */
            color: #fff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none; /* 誤ってテキストを選択しないようにする */
        }

        /* タイトル部分 */
        .header {
            text-align: center;
            padding: 50px 0;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* スコアボード全体（3チーム並べる） */
        .scoreboard {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            gap: 40px;
            padding: 0 40px;
            margin-bottom: 100px;
        }

        /* 各チームのカード */
        .team-card {
            background: #222;
            border-radius: 20px;
            padding: 50px 20px;
            width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border-top: 8px solid;
        }

        /* チームごとのテーマカラー */
        #card-1 { border-color: #ff4757; } /* 赤 */
        #card-2 { border-color: #1e90ff; } /* 青 */
        #card-3 { border-color: #ffa502; } /* 黄 */

        /* チーム名（クリックで編集可能） */
        .team-name {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.2s;
            cursor: text;
        }
        .team-name:hover, .team-name:focus {
            background: rgba(255,255,255,0.1);
            outline: none;
        }

        /* 操作ボタン */
        .btn {
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
        }
        
        /* 得点UPボタン（大きめ） */
        .btn-up {
            width: 80%;
            background: #444;
            color: #fff;
            font-size: 2.5rem;
            padding: 10px;
            margin-bottom: 15px;
            box-shadow: 0 5px 0 #000;
        }
        .btn-up:hover { background: #5a5a5a; }
        .btn-up:active { box-shadow: 0 0 0 #000; transform: translateY(5px); }

        /* 得点DOWNボタン（控えめ） */
        .btn-down {
            width: 50%;
            background: #2a2a2a;
            color: #666;
            font-size: 1.5rem;
            padding: 5px;
            margin-top: 15px;
        }
        .btn-down:hover { background: #333; color: #aaa; }
        .btn-down:active { transform: scale(0.95); }

        /* 得点が表示される黒い窓 */
        .score-window {
            background: #000;
            width: 100%;
            height: 180px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.1);
            perspective: 800px; /* 3D回転を綺麗に見せるための奥行き */
            overflow: hidden;
        }

        /* 得点の数字 */
        .score {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            font-variant-numeric: tabular-nums; /* 数字の幅を一定にしてガタつき防止 */
            transform-origin: center center;
        }

        /* キーボード操作のヒント */
        .key-hint {
            margin-top: 50px;
            font-size: 1rem;
            color: #666;
            font-family: monospace;
            font-weight: bold;
        }

        /* =========================================
           演出アニメーション（クルンッ！バンッ！）
           ========================================= */
        
        /* 1. UP時のアニメーション */
        .flip-out-up { animation: flipOutUp 0.15s ease-in forwards; }
        .flip-in-up  { animation: flipInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes flipOutUp {
            0%   { transform: rotateX(0deg) scale(1); opacity: 1; }
            100% { transform: rotateX(90deg) scale(1.1); opacity: 0; }
        }
        @keyframes flipInUp {
            /* 現れる瞬間に少し大きく、黄色く光らせることで「バンッ！」を演出 */
            0%   { transform: rotateX(-90deg) scale(1.3); opacity: 0; color: #ffeb3b; text-shadow: 0 0 30px #ffeb3b; }
            100% { transform: rotateX(0deg) scale(1); opacity: 1; color: #fff; text-shadow: 0 0 0px transparent; }
        }

        /* 2. DOWN時のアニメーション（控えめにスッと変える） */
        .flip-out-down { animation: flipOutDown 0.15s ease-in forwards; }
        .flip-in-down  { animation: flipInDown 0.3s ease-out forwards; }

        @keyframes flipOutDown {
            0%   { transform: rotateX(0deg); opacity: 1; }
            100% { transform: rotateX(-90deg); opacity: 0; }
        }
        @keyframes flipInDown {
            0%   { transform: rotateX(90deg); opacity: 0; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }
    </style>
</head>
<body>

        <div class="header">
        秘書検定クイズ大会
        </div>

    <div class="scoreboard">
        <!-- チーム① -->
        <div class="team-card" id="card-1">
            <div class="team-name" contenteditable="true">チーム ①</div>
            <button class="btn btn-up" onclick="changeScore(1, 1)">▲</button>
            <div class="score-window">
                <div class="score" id="score-1">0</div>
            </div>
            <button class="btn btn-down" onclick="changeScore(1, -1)">▼</button>
            <div class="key-hint">Aキー:＋ / Zキー:－</div>
        </div>

        <!-- チーム② -->
        <div class="team-card" id="card-2">
            <div class="team-name" contenteditable="true">チーム ②</div>
            <button class="btn btn-up" onclick="changeScore(2, 1)">▲</button>
            <div class="score-window">
                <div class="score" id="score-2">0</div>
            </div>
            <button class="btn btn-down" onclick="changeScore(2, -1)">▼</button>
            <div class="key-hint">Sキー:＋ / Xキー:－</div>
        </div>

        <!-- チーム③ -->
        <div class="team-card" id="card-3">
            <div class="team-name" contenteditable="true">チーム ③</div>
            <button class="btn btn-up" onclick="changeScore(3, 1)">▲</button>
            <div class="score-window">
                <div class="score" id="score-3">0</div>
            </div>
            <button class="btn btn-down" onclick="changeScore(3, -1)">▼</button>
            <div class="key-hint">Dキー:＋ / Cキー:－</div>
        </div>
    </div>

    <script>
        // 各チームの現在のスコアを管理
        const scores = { 1: 0, 2: 0, 3: 0 };
        // アニメーション中の連打バグを防ぐフラグ
        const isAnimating = { 1: false, 2: false, 3: false };

        // スコアを変更する関数
        function changeScore(teamId, delta) {
            if (isAnimating[teamId]) return; // 動いている最中は無視
            
            const newScore = scores[teamId] + delta;
            if (newScore < 0) return; // スコアがマイナスになるのを防ぐ
            
            scores[teamId] = newScore;
            animateScore(teamId, newScore, delta > 0);
        }

        // アニメーションを実行する関数
        function animateScore(teamId, newScore, isUp) {
            const scoreEl = document.getElementById(`score-${teamId}`);
            isAnimating[teamId] = true;
            
            // クラスを一旦リセット
            scoreEl.className = 'score';
            void scoreEl.offsetWidth; // ブラウザにリセットを認識させるおまじない
            
            // 1. クルンッ！と消えるアニメーションを付与
            scoreEl.classList.add(isUp ? 'flip-out-up' : 'flip-out-down');
            
            // アニメーションの途中で数字を入れ替える
            setTimeout(() => {
                scoreEl.textContent = newScore;
                scoreEl.className = 'score';
                void scoreEl.offsetWidth;
                
                // 2. バンッ！と現れるアニメーションを付与
                scoreEl.classList.add(isUp ? 'flip-in-up' : 'flip-in-down');
                
                // アニメーション終了後にフラグを解除
                setTimeout(() => {
                    scoreEl.className = 'score';
                    isAnimating[teamId] = false;
                }, 400); // flip-inの時間に合わせる
            }, 150); // flip-outの時間に合わせる
        }

        // キーボード操作の対応
        document.addEventListener('keydown', (e) => {
            // チーム名を編集中は、キーボードショートカットを無効にする
            if (e.target.isContentEditable) return;
            
            const key = e.key.toLowerCase();
            switch(key) {
                // チーム①
                case 'a': changeScore(1, 1); break;
                case 'z': changeScore(1, -1); break;
                // チーム②
                case 's': changeScore(2, 1); break;
                case 'x': changeScore(2, -1); break;
                // チーム③
                case 'd': changeScore(3, 1); break;
                case 'c': changeScore(3, -1); break;
            }
        });
    </script>
</body>
</html>
