<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>使い方</title>
  <style>
    body {
      background-color: #DCDCDC;
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
    }
    h1 {
      text-align: center;
    }
    .image-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .image-grid img {
      width: 45%;
      height: auto;
      box-sizing: border-box;
      border: 5px solid #999999;
    }
  </style>
</head>
<body>
  <h1>使い方</h1>
  <div class="image-grid">
    <img src="Tutorial Images/1.png">
    <img src="Tutorial Images/2.png">
    <img src="Tutorial Images/3.png">
    <img src="Tutorial Images/4.png">
    <img src="Tutorial Images/5.png">
  </div>
</body>
</html>
